version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 5
    groups:
      patch-updates:
        update-types:
          - patch
    ignore:
      # next@16 migration is a separate planned effort — see backlog/16-deps-audit-upgrade.md
      - dependency-name: next
        update-types: [version-update:semver-major]
      - dependency-name: eslint-config-next
        update-types: [version-update:semver-major]
      - dependency-name: next-pwa
        update-types: [version-update:semver-major]
